name: spacecraft

services:

  app:
    container_name: spacecraft-app
    build:
      # context is the project root (will be used later for COPY in prod).
      context: .
      dockerfile: docker/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    restart: unless-stopped
    environment:
      # Local dev domains served over HTTPS. Caddy (inside FrankenPHP) issues a
      # cert for each host from its own local CA (see CADDY_GLOBAL_OPTIONS).
      SERVER_NAME: "dev.spacecraft.com www.dev.spacecraft.com admin.dev.spacecraft.com"
      # Use Caddy's internal CA instead of Let's Encrypt.
      # Caddy also handles HTTP->HTTPS redirect and HSTS automatically.
      CADDY_GLOBAL_OPTIONS: "local_certs"
      DATABASE_URL: "postgresql://spaceboy:spaceboy@database:5432/spacecraft?serverVersion=18&charset=utf8"
    # https://dev.spacecraft.com is bound to localhost only (not exposed on LAN).
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    # code monté en direct (hot reload en dev)
    volumes:
      - .:/app
      # Persist Caddy state (local CA / TLS certs live in /data) so the CA
      # survives container rebuilds -> no need to re-trust it each time.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - database

  database:
    container_name: spacecraft-postgres
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: spacecraft
      POSTGRES_USER: spaceboy
      POSTGRES_PASSWORD: spaceboy
    ports:
      # localhost only + host port 5433 to avoid clashing with another Postgres.
      - "127.0.0.1:5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

# Named volumes: Postgres data + Caddy state (both survive "compose down").
volumes:
  db_data:
  caddy_data:
  caddy_config:
